openapi: 3.1.0
info:
  title: IoT Fake API - Frontend Required Endpoints
  version: 1.1.0
  description: |
    OpenAPI contract untuk endpoint yang dibutuhkan frontend pada project iot-fakeapi.

    Catatan:
    - Frontend membaca URL dari environment variable:
      - REACT_APP_API_PETENGORAN_GET_TOPIC4
      - REACT_APP_API_KALIMANTAN_GET_TOPIC4
      - REACT_APP_API_DASHBOARD_GET_TOPIC4
    - Standard response endpoint topic4: object dengan properti `result`.
    - Endpoint topic4 mendukung pagination query `limit` dan `offset`.
    - Dokumen ini juga mencakup skenario hardening response (400, 429, 503).

servers:
  - url: https://api.example.com
    description: Example production server

tags:
  - name: Petengoran
  - name: Kalimantan
  - name: Dashboard
  - name: System

paths:
  /petengoran/topic4:
    get:
      tags: [Petengoran]
      summary: Get latest Petengoran data
      description: Endpoint data sensor untuk halaman dashboard/petengoran.
      operationId: getPetengoranTopic4
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWrapper'
              examples:
                wrappedResponse:
                  summary: Wrapper result
                  value:
                    result:
                      - timestamp: "28-03-26 10:30:00"
                        humidity: 78.3
                        temperature: 30.1
                        AirPressure: 1009.8
                        windSpeed: 4.2
                        rainfall: 0
                        angle: 135
                        suhuAir: 28.4
                        irradiation: 650.2
                        bmpTemperature: 30.0
        '400':
          $ref: '#/components/responses/BadRequestError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /kalimantan/topic4:
    get:
      tags: [Kalimantan]
      summary: Get latest Kalimantan data
      description: Endpoint data sensor untuk halaman Kalimantan.
      operationId: getKalimantanTopic4
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWrapper'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /dashboard/topic4:
    get:
      tags: [Dashboard]
      summary: Get latest dashboard data (optional)
      description: Endpoint opsional jika dashboard menggunakan sumber data terpisah.
      operationId: getDashboardTopic4
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWrapper'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /health:
    get:
      tags: [System]
      summary: Service and database health status
      operationId: getHealth
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  value:
                    message: ok
                    databases:
                      petengoran: ok
                      kalimantan: ok
                      dashboard: ok
        '503':
          description: Service degraded (minimal satu database error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                degraded:
                  value:
                    message: degraded
                    databases:
                      petengoran: ok
                      kalimantan: error
                      dashboard: ok

components:
  schemas:
    SensorRecord:
      type: object
      additionalProperties: true
      properties:
        timestamp:
          type: string
          description: Timestamp sensor. Disarankan konsisten dalam format yang mudah diparse JavaScript Date.
          examples: ["28-03-26 10:30:00", "2026-03-28T10:30:00Z"]
        humidity:
          type: number
          nullable: true
        temperature:
          type: number
          nullable: true
        AirPressure:
          type: number
          nullable: true
          description: Perhatikan kapitalisasi field (A dan P besar) untuk kompatibilitas frontend saat ini.
        windSpeed:
          type: number
          nullable: true
        rainfall:
          type: number
          nullable: true
        angle:
          type: number
          nullable: true
          description: Arah angin dalam derajat.
        suhuAir:
          type: number
          nullable: true
        irradiation:
          type: number
          nullable: true
        bmpTemperature:
          type: number
          nullable: true
        direction:
          type: string
          nullable: true
          description: Field alternatif yang dipakai di beberapa komponen.
        pyrano:
          type: number
          nullable: true
          description: Field alternatif irradiance untuk beberapa komponen.

    ResultWrapper:
      type: object
      required: [result]
      properties:
        result:
          type: array
          items:
            $ref: '#/components/schemas/SensorRecord'

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Internal Server Error

    HealthResponse:
      type: object
      required: [message, databases]
      properties:
        message:
          type: string
          enum: [ok, degraded]
        databases:
          type: object
          additionalProperties:
            type: string
            enum: [ok, error, not-configured]

  parameters:
    PaginationLimit:
      name: limit
      in: query
      required: false
      description: Jumlah maksimum data yang dikembalikan.
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
      examples:
        default:
          value: 100
    PaginationOffset:
      name: offset
      in: query
      required: false
      description: Posisi awal data untuk pagination.
      schema:
        type: integer
        minimum: 0
        default: 0
      examples:
        default:
          value: 0

  responses:
    BadRequestError:
      description: Bad request (validasi query gagal)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidLimit:
              value:
                message: Query parameter 'limit' harus bilangan bulat positif.
            invalidOffset:
              value:
                message: Query parameter 'offset' harus bilangan bulat nol atau lebih.
    TooManyRequestsError:
      description: Request melebihi rate limit
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            throttled:
              value:
                message: Terlalu banyak request. Coba lagi sebentar lagi.
    ServiceUnavailableError:
      description: Service sementara tidak tersedia (degraded)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            degradedService:
              value:
                message: Service Unavailable
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
