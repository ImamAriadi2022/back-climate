openapi: 3.1.0
info:
  title: Back Climate API - Frontend Friendly Docs
  version: 1.3.0
  description: |
    Dokumentasi API untuk kebutuhan frontend Back Climate.

    Ringkasan cepat:
    - Semua endpoint topic4 menggunakan response yang konsisten: `{ result: SensorRecord[] }`.
    - Endpoint `.../topic4/latest` mengembalikan data terbaru (1 record).
    - Endpoint `.../topic4/history` mengembalikan seluruh history data.
    - Jika request terlalu banyak, API mengembalikan 429.

    Mapping URL frontend (contoh):
    - REACT_APP_API_PETENGORAN_GET_TOPIC4 -> /petengoran/topic4
    - REACT_APP_API_KALIMANTAN_GET_TOPIC4 -> /kalimantan/topic4
    - REACT_APP_API_DASHBOARD_GET_TOPIC4 -> /dashboard/topic4

servers:
  - url: https://api.example.com
    description: Example production server

tags:
  - name: Petengoran
    description: Data sensor terbaru untuk halaman/section Petengoran.
  - name: Kalimantan
    description: Data sensor terbaru untuk halaman/section Kalimantan.
  - name: Dashboard
    description: Data sensor umum untuk ringkasan dashboard.
  - name: System
    description: Endpoint utilitas untuk memantau status layanan.

paths:
  /petengoran/topic4:
    get:
      tags: [Petengoran]
      summary: Legacy - Ambil history data topic4 Petengoran
      deprecated: true
      description: |
        Endpoint lama untuk kompatibilitas frontend existing.
        Perilaku sama dengan `/petengoran/topic4/history`.
      operationId: getPetengoranTopic4Legacy
      responses:
        '200':
          description: Berhasil mengambil data sensor Petengoran
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWrapper'
              examples:
                fullHistory:
                  summary: History data Petengoran
                  value:
                    result:
                      - timestamp: "28-03-26 10:30:00"
                        humidity: 78.3
                        temperature: 30.1
                        AirPressure: 1009.8
                        windSpeed: 4.2
                        rainfall: 0
                        angle: 135
                        suhuAir: 28.4
                        irradiation: 650.2
                        bmpTemperature: 30.0
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /petengoran/topic4/history:
    get:
      tags: [Petengoran]
      summary: Ambil seluruh history data topic4 Petengoran
      description: Mengembalikan semua data sensor Petengoran, diurutkan dari terbaru ke terlama.
      operationId: getPetengoranTopic4History
      responses:
        '200':
          description: Berhasil mengambil history data sensor Petengoran
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWrapper'
              examples:
                history:
                  summary: Seluruh history data
                  value:
                    result:
                      - timestamp: "28-03-26 10:30:00"
                        humidity: 78.3
                        temperature: 30.1
                        AirPressure: 1009.8
                        windSpeed: 4.2
                        rainfall: 0
                      - timestamp: "28-03-26 10:25:00"
                        humidity: 79.1
                        temperature: 29.9
                        AirPressure: 1010.1
                        windSpeed: 4.0
                        rainfall: 0
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /petengoran/topic4/latest:
    get:
      tags: [Petengoran]
      summary: Ambil data terbaru topic4 Petengoran
      description: Mengembalikan 1 record data sensor paling baru dari Petengoran.
      operationId: getPetengoranTopic4Latest
      responses:
        '200':
          description: Berhasil mengambil data terbaru Petengoran
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWrapper'
              examples:
                latest:
                  summary: Satu record terbaru
                  value:
                    result:
                      - timestamp: "28-03-26 10:30:00"
                        humidity: 78.3
                        temperature: 30.1
                        AirPressure: 1009.8
                        windSpeed: 4.2
                        rainfall: 0
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /kalimantan/topic4:
    get:
      tags: [Kalimantan]
      summary: Legacy - Ambil history data topic4 Kalimantan
      deprecated: true
      description: |
        Endpoint lama untuk kompatibilitas frontend existing.
        Perilaku sama dengan `/kalimantan/topic4/history`.
      operationId: getKalimantanTopic4Legacy
      responses:
        '200':
          description: Berhasil mengambil data sensor Kalimantan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWrapper'
              examples:
                success:
                  summary: Response sukses
                  value:
                    result:
                      - timestamp: "28-03-26 10:30:00"
                        humidity: 82.2
                        temperature: 31.2
                        AirPressure: 1008.7
                        windSpeed: 2.3
                        rainfall: 0
                        angle: 110
                        suhuAir: 29.1
                        irradiation: 580.0
                        bmpTemperature: 31.0
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /kalimantan/topic4/history:
    get:
      tags: [Kalimantan]
      summary: Ambil seluruh history data topic4 Kalimantan
      description: Mengembalikan semua data sensor Kalimantan, diurutkan dari terbaru ke terlama.
      operationId: getKalimantanTopic4History
      responses:
        '200':
          description: Berhasil mengambil history data Kalimantan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWrapper'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /kalimantan/topic4/latest:
    get:
      tags: [Kalimantan]
      summary: Ambil data terbaru topic4 Kalimantan
      description: Mengembalikan 1 record data sensor paling baru dari Kalimantan.
      operationId: getKalimantanTopic4Latest
      responses:
        '200':
          description: Berhasil mengambil data terbaru Kalimantan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWrapper'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /dashboard/topic4:
    get:
      tags: [Dashboard]
      summary: Legacy - Ambil history data topic4 Dashboard
      deprecated: true
      description: |
        Endpoint lama untuk kompatibilitas frontend existing.
        Perilaku sama dengan `/dashboard/topic4/history`.
      operationId: getDashboardTopic4Legacy
      responses:
        '200':
          description: Berhasil mengambil data dashboard topic4
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWrapper'
              examples:
                success:
                  summary: Response sukses
                  value:
                    result:
                      - timestamp: "28-03-26 10:30:00"
                        humidity: 78.3
                        temperature: 30.1
                        AirPressure: 1009.8
                        windSpeed: 4.2
                        rainfall: 0
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /dashboard/topic4/history:
    get:
      tags: [Dashboard]
      summary: Ambil seluruh history data topic4 Dashboard
      description: Mengembalikan semua data sensor Dashboard, diurutkan dari terbaru ke terlama.
      operationId: getDashboardTopic4History
      responses:
        '200':
          description: Berhasil mengambil history data Dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWrapper'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /dashboard/topic4/latest:
    get:
      tags: [Dashboard]
      summary: Ambil data terbaru topic4 Dashboard
      description: Mengembalikan 1 record data sensor paling baru dari Dashboard.
      operationId: getDashboardTopic4Latest
      responses:
        '200':
          description: Berhasil mengambil data terbaru Dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWrapper'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /health:
    get:
      tags: [System]
      summary: Cek status service dan database
      description: Endpoint untuk monitoring internal. Bukan untuk konsumsi data frontend utama.
      operationId: getHealth
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  value:
                    message: ok
                    databases:
                      petengoran: ok
                      kalimantan: ok
                      dashboard: ok
        '503':
          description: Service degraded (minimal satu database error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                degraded:
                  value:
                    message: degraded
                    databases:
                      petengoran: ok
                      kalimantan: error
                      dashboard: ok

components:
  schemas:
    SensorRecord:
      type: object
      additionalProperties: true
      description: Satu record data sensor topic4.
      properties:
        timestamp:
          type: string
          description: Timestamp data sensor (format mengikuti data sumber saat ini).
          examples: ["28-03-26 10:30:00", "2026-03-28T10:30:00Z"]
        humidity:
          type: number
          nullable: true
        temperature:
          type: number
          nullable: true
        AirPressure:
          type: number
          nullable: true
          description: Perhatikan kapitalisasi field (A dan P besar) untuk kompatibilitas frontend saat ini.
        windSpeed:
          type: number
          nullable: true
        rainfall:
          type: number
          nullable: true
        angle:
          type: number
          nullable: true
          description: Arah angin dalam derajat.
        suhuAir:
          type: number
          nullable: true
        irradiation:
          type: number
          nullable: true
        bmpTemperature:
          type: number
          nullable: true
        direction:
          type: string
          nullable: true
          description: Field alternatif yang dipakai di beberapa komponen.
        pyrano:
          type: number
          nullable: true
          description: Field alternatif irradiance untuk beberapa komponen.

    ResultWrapper:
      type: object
      required: [result]
      description: Format response standar endpoint topic4.
      properties:
        result:
          type: array
          items:
            $ref: '#/components/schemas/SensorRecord'

    ErrorResponse:
      type: object
      required: [message]
      description: Format error standar API.
      properties:
        message:
          type: string
          example: Internal Server Error

    HealthResponse:
      type: object
      required: [message, databases]
      properties:
        message:
          type: string
          enum: [ok, degraded]
        databases:
          type: object
          additionalProperties:
            type: string
            enum: [ok, error, not-configured]

  responses:
    TooManyRequestsError:
      description: Request melebihi rate limit
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            throttled:
              value:
                message: Terlalu banyak request. Coba lagi sebentar lagi.
    ServiceUnavailableError:
      description: Service sementara tidak tersedia (degraded)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            degradedService:
              value:
                message: Service sementara tidak tersedia.
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
